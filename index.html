<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBW | LIVE NETWORK</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue-neon: #00d2ff; --purple-neon: #bc13fe; --brown-bg: #3e2723; --dark-brown: #2b1d1a; }
        * { box-sizing: border-box; }
        body { background-color: var(--brown-bg); margin: 0; font-family: 'Tajawal', sans-serif; height: 100vh; color: white; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 15px; background: var(--dark-brown); border-bottom: 3px solid var(--purple-neon); text-align: center; font-family: 'Orbitron'; color: var(--purple-neon); text-shadow: 0 0 15px var(--purple-neon); }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: rgba(0,0,0,0.4); }
        
        .msg-card { background: rgba(20, 10, 20, 0.8); padding: 12px; border-radius: 10px; max-width: 80%; border: 2px solid var(--purple-neon); align-self: flex-start; }
        .my-msg { align-self: flex-end; border-color: var(--blue-neon); background: rgba(0, 210, 255, 0.05); }
        .msg-card img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--purple-neon); }
        .user-tag { display: block; font-family: 'Orbitron'; font-size: 10px; color: var(--purple-neon); margin-bottom: 8px; }
        .my-msg .user-tag { color: var(--blue-neon); }

        .input-area { padding: 20px; background: var(--dark-brown); display: flex; gap: 10px; border-top: 2px solid var(--purple-neon); align-items: center; }
        input[type="text"] { flex: 1; padding: 15px; background: #120c0b; border: 1px solid var(--purple-neon); color: white; border-radius: 8px; outline: none; }
        button { padding: 0 25px; height: 50px; background: var(--purple-neon); border: none; color: white; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="header">KBW LIVE CLOUD</div>
    <div id="messages"></div>

    <div class="input-area">
        <label for="file-input" style="cursor:pointer; font-size:24px;">📸</label>
        <input type="file" id="file-input" accept="image/*">
        <input type="text" id="chat-input" placeholder="أرسل للجهاز الآخر...">
        <button id="send-btn">SEND</button>
    </div>

    <script>
        // --- ضع بيانات Firebase الخاصة بك هنا ---
        const firebaseConfig = {
            apiKey: "ضع_هنا_الـ_API_KEY",
            databaseURL: "ضع_هنا_رابط_القاعدة",
            projectId: "kbw-chat",
            storageBucket: "kbw-chat.appspot.com",
            messagingSenderId: "123456",
            appId: "1:123456:web:abcdef"
        };
        
        // تشغيل Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const chatRef = database.ref("messages");

        const chatInput = document.getElementById('chat-input');
        const messagesDiv = document.getElementById('messages');
        const fileInput = document.getElementById('file-input');

        // وظيفة الإرسال للسيرفر
        function sendMessage(content, isImage = false) {
            chatRef.push({
                content: content,
                isImage: isImage,
                sender: "USER_" + window.navigator.platform.substring(0,3), // لتمييز الجهاز
                timestamp: Date.now()
            });
        }

        // الاستماع للرسائل (أول ما تجي رسالة بالسيرفر تطلع عند الكل فوراً)
        chatRef.on("child_added", (snapshot) => {
            const data = snapshot.val();
            displayMessage(data.content, data.isImage);
        });

        function displayMessage(content, isImage) {
            const msgCard = document.createElement('div');
            msgCard.className = `msg-card`; // يمكنك إضافة منطق لتمييز "رسائلي" عن "رسائلهم"
            
            let html = `<span class="user-tag">KBW_CLOUD</span>`;
            if (isImage) html += `<img src="${content}">`;
            else html += `<div>${content}</div>`;
            
            msgCard.innerHTML = html;
            messagesDiv.appendChild(msgCard);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        document.getElementById('send-btn').onclick = () => {
            if (chatInput.value.trim()) {
                sendMessage(chatInput.value);
                chatInput.value = "";
            }
        };

        fileInput.onchange = function() {
            const reader = new FileReader();
            reader.onload = (e) => sendMessage(e.target.result, true);
            reader.readAsDataURL(this.files[0]);
        };
    </script>
</body>
</html>
