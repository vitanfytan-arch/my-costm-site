<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBW | VIOLET SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue-neon: #00d2ff; 
            --purple-neon: #bc13fe; 
            --brown-bg: #3e2723; 
            --dark-brown: #2b1d1a; 
        }
        
        * { box-sizing: border-box; }
        body { 
            background-color: var(--brown-bg); 
            margin: 0; font-family: 'Tajawal', sans-serif; 
            height: 100vh; color: white; 
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* --- شاشة الدخول --- */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1210;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-in-out;
        }

        .intro-text {
            font-family: 'Orbitron';
            font-size: 30px;
            color: var(--purple-neon);
            text-shadow: 0 0 15px var(--purple-neon);
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.4; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.05); }
        }

        /* --- الواجهة الرئيسية --- */
        #main-content {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        @keyframes sway {
            0% { transform: translateX(0px); }
            50% { transform: translateX(10px); }
            100% { transform: translateX(0px); }
        }

        .header { 
            padding: 15px; background: var(--dark-brown); 
            border-bottom: 3px solid var(--purple-neon); 
            text-align: center; font-family: 'Orbitron'; 
            color: var(--purple-neon); text-shadow: 0 0 15px var(--purple-neon);
            animation: sway 4s infinite ease-in-out;
        }

        #messages { 
            flex: 1; padding: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(0,0,0,0.4);
        }
        
        .msg-card { 
            background: rgba(20, 10, 20, 0.8); padding: 12px; 
            border-radius: 10px; max-width: 80%; 
            border: 2px solid var(--purple-neon); 
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            align-self: flex-start;
            animation: sway 6s infinite ease-in-out;
        }
        
        .my-msg {
            align-self: flex-end; 
            border-color: var(--blue-neon);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            background: rgba(0, 210, 255, 0.05);
        }

        .msg-card img {
            max-width: 100%; border-radius: 8px; margin-top: 10px;
            border: 1px solid var(--purple-neon);
            display: block;
        }

        .user-tag { 
            display: block; font-family: 'Orbitron'; 
            font-size: 10px; color: var(--purple-neon); 
            margin-bottom: 8px; font-weight: bold;
        }

        .my-msg .user-tag { color: var(--blue-neon); }

        /* منطقة الإدخال */
        .input-area { 
            padding: 20px; background: var(--dark-brown); 
            display: flex; gap: 10px; border-top: 2px solid var(--purple-neon);
            align-items: center;
        }

        input[type="text"] { 
            flex: 1; padding: 15px; background: #120c0b; 
            border: 1px solid var(--purple-neon); color: white; 
            border-radius: 8px; outline: none;
        }

        .file-label {
            cursor: pointer; font-size: 24px;
            transition: 0.3s;
        }
        .file-label:hover { transform: scale(1.2); }

        button { 
            padding: 0 25px; height: 50px; background: var(--purple-neon); 
            border: none; color: white; border-radius: 8px; 
            font-weight: bold; cursor: pointer; font-family: 'Orbitron';
            box-shadow: 0 0 10px var(--purple-neon);
        }
        
        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-text">SYNCING KBW SYSTEM...</div>
    </div>

    <div id="main-content">
        <div class="header">KBW NETWORK</div>

        <div id="messages">
            </div>

        <div class="input-area">
            <label for="file-input" class="file-label">📸</label>
            <input type="file" id="file-input" accept="image/*">
            <input type="text" id="chat-input" placeholder="ACCESS SYSTEM...">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');
        const fileInput = document.getElementById('file-input');

        // 1. تحميل الرسائل المخزنة عند فتح الصفحة
        window.onload = () => {
            loadMessages();
            setTimeout(() => {
                document.getElementById('intro-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-overlay').style.display = 'none';
                    document.getElementById('main-content').style.display = 'flex';
                }, 1000);
            }, 2000);
        };

        // 2. وظيفة إضافة رسالة وحفظها
        function addMessage(content, type, isImage = false, save = true) {
            const msgCard = document.createElement('div');
            msgCard.className = `msg-card ${type}`;
            
            const userTag = document.createElement('span');
            userTag.className = 'user-tag';
            userTag.innerText = type === 'my-msg' ? 'KBW_USER' : 'KBW_ROOT';
            
            msgCard.appendChild(userTag);

            if (isImage) {
                const img = document.createElement('img');
                img.src = content;
                msgCard.appendChild(img);
            } else {
                const text = document.createElement('div');
                text.innerText = content;
                msgCard.appendChild(text);
            }

            messagesDiv.appendChild(msgCard);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            if (save) {
                saveMessageLocal(content, type, isImage);
            }
        }

        // 3. حفظ في ذاكرة المتصفح
        function saveMessageLocal(content, type, isImage) {
            let history = JSON.parse(localStorage.getItem('kbw_history')) || [];
            history.push({content, type, isImage});
            localStorage.setItem('kbw_history', JSON.stringify(history));
        }

        // 4. استرجاع التاريخ
        function loadMessages() {
            let history = JSON.parse(localStorage.getItem('kbw_history')) || [];
            if (history.length === 0) {
                addMessage("نظام KBW جاهز. (ملاحظة: الرسائل تحفظ على هذا الجهاز فقط)", 'root', false, false);
            } else {
                history.forEach(msg => {
                    addMessage(msg.content, msg.type, msg.isImage, false);
                });
            }
        }

        sendBtn.onclick = () => {
            if (chatInput.value.trim() !== "") {
                addMessage(chatInput.value, 'my-msg');
                chatInput.value = "";
            }
        };

        chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendBtn.click(); };

        fileInput.onchange = function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => addMessage(e.target.result, 'my-msg', true);
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
