<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSTM | نظام التواصل المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* إعدادات الألوان الطبيعية */
        :root {
            --main-bg: #f8fafc;
            --card-bg: #ffffff;
            --primary-color: #1e293b;
            --accent-color: #3b82f6;
            --text-dark: #334155;
            --text-light: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حاوية النوافذ */
        .window-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        h2 { text-align: center; margin-bottom: 25px; color: var(--primary-color); font-weight: 700; }

        .input-field {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .input-field:focus { border-color: var(--accent-color); }

        .main-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .main-btn:hover { background-color: #0f172a; transform: translateY(-2px); }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-light);
            cursor: pointer;
        }

        .toggle-link span { color: var(--accent-color); font-weight: 600; }

        /* واجهة الشات */
        #chat-interface {
            display: none;
            width: 95%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .chat-header {
            padding: 20px 30px;
            background: var(--primary-color);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-box {
            background: white;
            padding: 12px 18px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            max-width: 80%;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .msg-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; }
        .msg-user { font-weight: 700; color: var(--accent-color); }
        .msg-admin { color: var(--danger); font-weight: 800; }

        .chat-input-area {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
        }

        .del-btn {
            color: var(--danger);
            font-size: 11px;
            cursor: pointer;
            border: 1px solid var(--danger);
            padding: 2px 6px;
            border-radius: 5px;
            display: none;
            margin-top: 8px;
            width: fit-content;
        }

        .admin-badge {
            background: var(--danger);
            color: white;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div id="auth-container" class="window-container">
        <h2 id="form-title">دخول النظام</h2>
        
        <div id="login-form">
            <input type="text" id="log-user" class="input-field" placeholder="اسم المستخدم">
            <input type="password" id="log-pass" class="input-field" placeholder="كلمة المرور">
            <button class="main-btn" onclick="handleLogin()">تسجيل الدخول</button>
            <div class="toggle-link" onclick="toggleAuth(true)">ليس لديك حساب؟ <span>إنشاء حساب جديد</span></div>
        </div>

        <div id="reg-form" style="display: none;">
            <input type="text" id="reg-user" class="input-field" placeholder="اختر اسم المستخدم">
            <input type="password" id="reg-pass" class="input-field" placeholder="اختر كلمة المرور">
            <button class="main-btn" onclick="handleRegister()" style="background-color: var(--accent-color);">تأكيد التسجيل</button>
            <div class="toggle-link" onclick="toggleAuth(false)">لديك حساب بالفعل؟ <span>دخول</span></div>
        </div>
    </div>

    <div id="chat-interface">
        <div class="chat-header">
            <div>
                <span id="current-user-display" style="font-weight: bold;"></span>
                <span id="role-badge"></span>
            </div>
            <button onclick="location.reload()" style="background:none; border:1px solid rgba(255,255,255,0.3); color:white; padding:5px 15px; border-radius:8px; cursor:pointer;">خروج آمن</button>
        </div>

        <div id="chat-messages" class="chat-messages"></div>

        <div class="chat-input-area">
            <input type="text" id="messageInput" class="input-field" placeholder="اكتب رسالتك هنا..." style="margin:0;">
            <button class="main-btn" style="width: 100px; margin:0;" onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, get, child, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCStasVXz1XVpz16U-X0tscQQYI8CFkeRM",
            authDomain: "costm-system.firebaseapp.com",
            projectId: "costm-system",
            storageBucket: "costm-system.firebasestorage.app",
            messagingSenderId: "24126933645",
            appId: "1:24126933645:web:e38b4a3456dd1e5d87b0c4",
            databaseURL: "https://costm-system-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const usersRef = ref(db, 'system_users');
        const chatRef = ref(db, 'v2_messages');

        // تبديل بين الدخول والتسجيل
        window.toggleAuth = (showReg) => {
            document.getElementById('login-form').style.display = showReg ? 'none' : 'block';
            document.getElementById('reg-form').style.display = showReg ? 'block' : 'none';
            document.getElementById('form-title').innerText = showReg ? 'إنشاء حساب' : 'دخول النظام';
        };

        // إنشاء حساب جديد
        window.handleRegister = async () => {
            const u = document.getElementById('reg-user').value;
            const p = document.getElementById('reg-pass').value;
            if(!u || !p) return alert("امسح الخانات واكتب بياناتك");

            const snapshot = await get(child(usersRef, u));
            if(snapshot.exists()) return alert("هذا المستخدم موجود مسبقاً");

            await set(child(usersRef, u), { password: p, role: 'user' });
            alert("تم إنشاء الحساب بنجاح! يمكنك الدخول الآن");
            toggleAuth(false);
        };

        // تسجيل الدخول
        window.handleLogin = async () => {
            const u = document.getElementById('log-user').value;
            const p = document.getElementById('log-pass').value;

            // كود الآدمن الخاص بك
            if(u === "22" && p === "4411") {
                enterChat("المدير العام", "admin");
                return;
            }

            const snapshot = await get(child(usersRef, u));
            if(snapshot.exists() && snapshot.val().password === p) {
                enterChat(u, 'user');
            } else {
                alert("بيانات الدخول خاطئة أو الحساب غير موجود");
            }
        };

        function enterChat(username, role) {
            sessionStorage.setItem('c_user', username);
            sessionStorage.setItem('c_role', role);
            
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';
            document.getElementById('current-user-display').innerText = "مرحباً: " + username;
            if(role === 'admin') document.getElementById('role-badge').innerHTML = '<span class="admin-badge">إدارة</span>';
        }

        // إرسال رسالة
        window.sendMessage = () => {
            const text = document.getElementById('messageInput').value;
            const user = sessionStorage.getItem('c_user');
            const role = sessionStorage.getItem('c_role');
            if(text) {
                push(chatRef, { user, text, role, time: new Date().toLocaleTimeString() });
                document.getElementById('messageInput').value = "";
            }
        };

        // استقبال الرسائل
        onChildAdded(chatRef, (snap) => {
            const data = snap.val();
            const isAdmin = sessionStorage.getItem('c_role') === 'admin';
            const box = document.getElementById('chat-messages');
            
            const div = document.createElement('div');
            div.className = 'msg-box';
            div.innerHTML = `
                <div class="msg-info">
                    <span class="${data.role === 'admin' ? 'msg-admin' : 'msg-user'}">${data.user}</span>
                    <span style="color:#aaa">${data.time}</span>
                </div>
                <div>${data.text}</div>
                <div class="del-btn" id="btn-${snap.key}" onclick="deleteMessage('${snap.key}')">حذف الرسالة</div>
            `;
            
            box.appendChild(div);
            if(isAdmin) document.getElementById(`btn-${snap.key}`).style.display = 'block';
            box.scrollTop = box.scrollHeight;
        });

        // حذف الرسالة (للآدمن فقط)
        window.deleteMessage = (id) => {
            if(confirm("هل أنت متأكد من حذف هذه الرسالة؟")) {
                remove(ref(db, `v2_messages/${id}`));
                location.reload(); 
            }
        };
    </script>
</body>
</html>
