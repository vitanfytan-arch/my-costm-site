<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KBW | NEURAL SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --neon: #00f2fe; --dark: #050a0e; --purple: #7000ff; --gold: #d4af37; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); margin: 0; font-family: 'Tajawal', sans-serif; height: 100vh; color: white; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; }
        
        /* واجهة الدخول */
        .auth-zone { position: relative; z-index: 10; text-align: center; width: 90%; max-width: 380px; }
        .logo-3d { font-family: 'Orbitron'; font-size: 5rem; color: var(--neon); animation: rotate3D 5s infinite linear; text-shadow: 0 0 20px var(--neon); margin-bottom: 30px; }
        @keyframes rotate3D { 0%, 100% { transform: rotateY(0); } 50% { transform: rotateY(30deg); } }
        
        .auth-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; border: 1px solid var(--neon); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--neon); border-radius: 12px; font-size: 16px; outline: none; text-align: center; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--purple), var(--neon)); border: none; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 1.1rem; }

        /* واجهة الشات */
        #chat-ui { display: none; width: 100%; height: 100%; background: rgba(5, 10, 14, 0.9); flex-direction: column; z-index: 20; position: relative; }
        .header { padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron'; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: rgba(0,0,0,0.2); }
        
        .msg-card { background: rgba(255,255,255,0.05); padding: 12px 18px; border-radius: 15px; max-width: 85%; border-right: 3px solid var(--neon); position: relative; animation: fadeIn 0.3s ease; }
        .magister-card { border-right-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .msg-user { color: var(--neon); font-size: 0.8rem; font-family: 'Orbitron'; display: block; margin-bottom: 5px; }
        .user-gold { color: var(--gold) !important; text-shadow: 0 0 10px var(--gold); }
        
        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .del-btn { color: #ff4d4d; font-size: 11px; cursor: pointer; border: 1px solid #ff4d4d; padding: 2px 6px; border-radius: 4px; display: none; margin-top: 8px; width: fit-content; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="auth-zone" id="auth-screen">
        <div class="logo-3d">KBW</div>
        <div class="auth-box" id="login-form">
            <input type="text" id="u-name" placeholder="IDENTITY (اليوزر)">
            <input type="password" id="u-pass" placeholder="PASSWORD (الباسورد)">
            <button class="btn" onclick="handleLogin()">ACCESS SYSTEM</button>
            <p onclick="toggleView(true)" style="margin-top:20px; font-size:13px; color:var(--neon); cursor:pointer">CREATE NEW IDENTITY (إنشاء حساب)</p>
        </div>
        
        <div class="auth-box" id="reg-form" style="display:none">
            <input type="text" id="r-name" placeholder="NEW IDENTITY">
            <input type="password" id="r-pass" placeholder="NEW PASSWORD">
            <button class="btn" style="background:var(--neon); color:#000" onclick="handleRegister()">REGISTER</button>
            <p onclick="toggleView(false)" style="margin-top:20px; font-size:13px; color:var(--neon); cursor:pointer">ALREADY HAVE IDENTITY? LOGIN</p>
        </div>
    </div>

    <div id="chat-ui">
        <div class="header">
            <div>
                <span id="my-id"></span>
                <span id="my-rank" style="font-size: 10px; margin-right:10px"></span>
            </div>
            <button onclick="location.reload()" style="background:none; border:1px solid var(--neon); color:var(--neon); padding:5px 10px; border-radius:8px;">LOGOUT</button>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="ENTER MESSAGE..." style="margin:0; text-align:right">
            <button class="btn" style="width:100px; margin:0" onclick="send()">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onChildAdded, remove, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCStasVXz1XVpz16U-X0tscQQYI8CFkeRM",
            authDomain: "costm-system.firebaseapp.com",
            projectId: "costm-system",
            storageBucket: "costm-system.firebasestorage.app",
            messagingSenderId: "24126933645",
            appId: "1:24126933645:web:e38b4a3456dd1e5d87b0c4",
            databaseURL: "https://costm-system-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const uRef = ref(db, 'kbw_users');
        const cRef = ref(db, 'kbw_chats');

        // جزيئات الخلفية
        particlesJS('particles-js', {
            "particles": { "number": { "value": 60 }, "color": { "value": "#00f2fe" }, "shape": { "type": "circle" }, "opacity": { "value": 0.3 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 150, "color": "#00f2fe", "opacity": 0.2, "width": 1 }, "move": { "enable": true, "speed": 1.5 } }
        });

        window.toggleView = (showReg) => {
            document.getElementById('login-form').style.display = showReg ? 'none' : 'block';
            document.getElementById('reg-form').style.display = showReg ? 'block' : 'none';
        };

        window.handleRegister = async () => {
            const u = document.getElementById('r-name').value;
            const p = document.getElementById('r-pass').value;
            if(!u || !p) return;
            const snap = await get(child(uRef, u));
            if(snap.exists()) return alert("Identity already exists!");
            await set(child(uRef, u), { p, r: 'user' });
            alert("Identity Created! Login now.");
            toggleView(false);
        };

        window.handleLogin = async () => {
            const u = document.getElementById('u-name').value;
            const p = document.getElementById('u-pass').value;

            if(u === "211" && p === "كوستم") {
                start("MAGISTER 🔱", "magister");
                return;
            }

            const snap = await get(child(uRef, u));
            if(snap.exists() && snap.val().p === p) {
                start(u, snap.val().r);
            } else {
                alert("ACCESS DENIED: Wrong Identity/Password");
            }
        };

        function start(name, rank) {
            sessionStorage.setItem('kbw_u', name);
            sessionStorage.setItem('kbw_r', rank);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            document.getElementById('my-id').innerText = name;
            document.getElementById('my-rank').innerText = rank === 'magister' ? '[RANK: MAGISTER]' : '[RANK: NEURAL]';
        }

        window.send = () => {
            const t = document.getElementById('msgInput').value;
            const u = sessionStorage.getItem('kbw_u');
            const r = sessionStorage.getItem('kbw_r');
            if(t) {
                push(cRef, { u, t, r, ts: new Date().toLocaleTimeString() });
                document.getElementById('msgInput').value = "";
            }
        };

        onChildAdded(cRef, (s) => {
            const d = s.val();
            const box = document.getElementById('messages');
            const isMag = sessionStorage.getItem('kbw_r') === 'magister';
            
            const div = document.createElement('div');
            div.className = `msg-card ${d.r === 'magister' ? 'magister-card' : ''}`;
            div.innerHTML = `
                <span class="msg-user ${d.r === 'magister' ? 'user-gold' : ''}">${d.u}</span>
                <div>${d.t}</div>
                <div class="del-btn" id="d-${s.key}" onclick="burn('${s.key}')">ERASE MESSAGE</div>
            `;
            box.appendChild(div);
            if(isMag) document.getElementById(`d-${s.key}`).style.display = 'block';
            box.scrollTop = box.scrollHeight;
        });

        window.burn = (id) => {
            if(confirm("Confirm Erase from Database?")) {
                remove(ref(db, `kbw_chats/${id}`));
                location.reload();
            }
        };
    </script>
</body>
</html>
