<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مذكرات أبها الفاخرة | ABHA VIP JOURNAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --abha-green: #2d5a27;
            --mist-white: #f8fafc;
            --soft-gold: #c5a059;
            --shadow-color: rgba(45, 90, 39, 0.1);
            --container-width: 500px;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-bottom: 250px; /* Space for the floating input area */
        }

        /* Main Container setup at 500px */
        .app-wrapper {
            width: var(--container-width);
            max-width: 95vw;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-top: 40px;
        }

        /* Elegant Header */
        .header {
            text-align: center;
            background: var(--abha-green);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px var(--shadow-color);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            margin: 0;
            font-family: 'Amiri', serif;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .header p {
            margin: 10px 0 0;
            opacity: 0.8;
            font-size: 14px;
        }

        /* Journal Entries List */
        #journal-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .entry-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-right: 6px solid var(--abha-green);
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .entry-card h3 {
            margin: 0 0 10px 0;
            color: var(--abha-green);
            font-size: 20px;
        }

        .entry-card p {
            margin: 0;
            line-height: 1.7;
            color: #475569;
            white-space: pre-wrap;
        }

        .entry-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-top: 15px;
            border: 1px solid #eee;
        }

        .entry-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 11px;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 10px;
        }

        /* Floating Input Area */
        .input-panel {
            position: fixed;
            bottom: 20px;
            width: var(--container-width);
            max-width: 95vw;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }

        .input-panel input, .input-panel textarea {
            width: 100%;
            border: 1.5px solid #e2e8f0;
            border-radius: 15px;
            padding: 12px 15px;
            font-family: 'Cairo';
            outline: none;
            background: white;
        }

        .input-panel input:focus, .input-panel textarea:focus {
            border-color: var(--abha-green);
            box-shadow: 0 0 0 4px rgba(45, 90, 39, 0.1);
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-media {
            background: #f1f5f9;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .btn-media:hover {
            background: #e2e8f0;
        }

        .btn-send {
            flex: 1;
            background: var(--abha-green);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-family: 'Cairo';
            cursor: pointer;
            font-size: 16px;
            height: 50px;
            box-shadow: 0 4px 15px rgba(45, 90, 39, 0.3);
        }

        .btn-send:hover {
            background: #1e3f1a;
            transform: translateY(-2px);
        }

        #image-preview {
            display: none;
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid var(--abha-green);
        }

        #file-input { display: none; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="header">
            <h1>مذكرات أبها البهية</h1>
            <p>سجل لحظاتك بين الضباب والجبال</p>
        </div>

        <div id="journal-list">
            <!-- Entries will appear here -->
        </div>
    </div>

    <!-- Floating Controller -->
    <div class="input-panel">
        <input type="text" id="task-title" placeholder="عنوان اللحظة.. (مثلاً: مطر السودة)">
        <textarea id="task-desc" placeholder="اكتب مشاعرك هنا.." rows="2"></textarea>
        
        <div class="controls">
            <label for="file-input" class="btn-media">📸</label>
            <input type="file" id="file-input" accept="image/*">
            <img id="image-preview" src="">
            <button class="btn-send" id="send-btn">حفظ في الذاكرة</button>
        </div>
    </div>

    <script>
        const sendBtn = document.getElementById('send-btn');
        const titleInput = document.getElementById('task-title');
        const descInput = document.getElementById('task-desc');
        const journalList = document.getElementById('journal-list');
        const fileInput = document.getElementById('file-input');
        const imgPreview = document.getElementById('image-preview');

        let selectedImage = null;

        // Load data from LocalStorage
        let database = JSON.parse(localStorage.getItem('abha_db')) || [];

        function init() {
            render();
        }

        function render() {
            journalList.innerHTML = '';
            database.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'entry-card';
                
                let imgHtml = item.image ? `<img src="${item.image}" alt="Moment Image">` : '';
                
                card.innerHTML = `
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                    ${imgHtml}
                    <div class="entry-meta">
                        <span>📍 أبها، المملكة العربية السعودية</span>
                        <span>${item.date}</span>
                    </div>
                `;
                journalList.prepend(card);
            });
            localStorage.setItem('abha_db', JSON.stringify(database));
        }

        // Handle Image Selection
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedImage = event.target.result;
                    imgPreview.src = selectedImage;
                    imgPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        // Handle Sending
        sendBtn.onclick = () => {
            const title = titleInput.value.trim();
            const desc = descInput.value.trim();

            if (title && desc) {
                const now = new Date();
                const dateStr = now.toLocaleDateString('ar-SA') + ' | ' + now.toLocaleTimeString('ar-SA', {hour: '2-digit', minute:'2-digit'});
                
                database.push({
                    title: title,
                    desc: desc,
                    image: selectedImage,
                    date: dateStr
                });

                // Clear inputs
                titleInput.value = '';
                descInput.value = '';
                selectedImage = null;
                imgPreview.style.display = 'none';
                
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        init();
    </script>
</body>
</html>
