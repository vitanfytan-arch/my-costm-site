<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KBW CHAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2fe; --dark: #050a0e; --purple: #7000ff; }
        * { box-sizing: border-box; }
        body { background: var(--dark); margin: 0; font-family: 'Tajawal', sans-serif; height: 100vh; color: white; display: flex; flex-direction: column; }
        
        /* الهيدر */
        .header { 
            padding: 15px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--neon); 
            display: flex; justify-content: space-between; align-items: center; 
            font-family: 'Orbitron'; color: var(--neon); text-shadow: 0 0 10px var(--neon);
        }

        /* منطقة عرض الكلام (الشات) */
        #messages { 
            flex: 1; padding: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 15px; 
            background: linear-gradient(to bottom, #050a0e, #0a1118);
        }
        
        .msg-card { 
            background: rgba(255,255,255,0.05); padding: 12px 18px; 
            border-radius: 15px; max-width: 85%; 
            border-right: 3px solid var(--neon); 
            align-self: flex-start;
        }
        
        /* رسائلي أنا تطلع بجهة اليمين ولون مختلف */
        .my-msg {
            align-self: flex-end; border-right: none; border-left: 3px solid var(--purple);
            background: rgba(112, 0, 255, 0.1);
        }

        .user-label { display: block; font-family: 'Orbitron'; font-size: 10px; color: var(--neon); margin-bottom: 5px; }

        /* منطقة الكتابة (هنا تقدر تكتب) */
        .input-area { 
            padding: 20px; background: #000; display: flex; gap: 10px; 
            border-top: 1px solid #222; 
        }

        input { 
            flex: 1; padding: 15px; background: #111; border: 1px solid #333; 
            color: var(--neon); border-radius: 10px; outline: none; font-size: 16px; 
        }

        .send-btn { 
            padding: 0 25px; background: linear-gradient(45deg, var(--purple), var(--neon)); 
            border: none; color: white; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <span>KBW SYSTEM</span>
        <span id="user-id" style="font-size: 10px; opacity: 0.6;"></span>
    </div>

    <div id="messages"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="اكتب هنا..." onkeypress="if(event.key==='Enter')send()">
        <button class="send-btn" onclick="send()">إرسال</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // بياناتك من الصور
        const firebaseConfig = {
            apiKey: "AIzaSyCStasVXz1XVpz16U-X0tscQQYI8CFkeRM",
            authDomain: "costm-system.firebaseapp.com",
            projectId: "costm-system",
            storageBucket: "costm-system.firebasestorage.app",
            messagingSenderId: "24126933645",
            appId: "1:24126933645:web:e38b4a3456dd1e5d87b0c4",
            databaseURL: "https://costm-system-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'kbw_chat_live');

        // توليد اسمك التلقائي
        let myName = localStorage.getItem('kbw_name') || "USER-" + Math.floor(Math.random() * 9999);
        localStorage.setItem('kbw_name', myName);
        document.getElementById('user-id').innerText = "ID: " + myName;

        // وظيفة الإرسال
        window.send = () => {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                push(chatRef, { user: myName, text: input.value });
                input.value = "";
            }
        };

        // وظيفة عرض الكلام فوراً
        onChildAdded(chatRef, (snap) => {
            const data = snap.val();
            const box = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg-card' + (data.user === myName ? ' my-msg' : '');
            div.innerHTML = `<span class="user-label">${data.user}</span><div>${data.text}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
