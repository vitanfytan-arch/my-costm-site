<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KBW | NEURAL HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --neon: #00f2fe; --dark: #050a0e; --purple: #7000ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); margin: 0; font-family: 'Tajawal', sans-serif; height: 100vh; color: white; overflow: hidden; display: flex; flex-direction: column; }
        
        /* تأثير الجزيئات في الخلفية */
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* اللوجو الـ 3D في الهيدر */
        .header { 
            position: relative; z-index: 10; padding: 10px; 
            background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--neon); 
            display: flex; justify-content: center; align-items: center; 
        }
        .logo-3d { 
            font-family: 'Orbitron'; font-size: 1.8rem; color: var(--neon); 
            animation: rotate3D 5s infinite linear; text-shadow: 0 0 15px var(--neon); 
        }
        @keyframes rotate3D { 0%, 100% { transform: rotateY(0); } 50% { transform: rotateY(30deg); } }

        /* منطقة الرسائل */
        #messages { 
            flex: 1; position: relative; z-index: 10; 
            padding: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 12px; 
        }
        
        .msg-card { 
            background: rgba(255,255,255,0.05); padding: 12px 15px; 
            border-radius: 12px; max-width: 85%; 
            border-right: 3px solid var(--neon); 
            animation: fadeIn 0.3s ease;
        }
        
        .user-tag { 
            display: block; font-family: 'Orbitron'; font-size: 10px; 
            color: var(--neon); margin-bottom: 4px; opacity: 0.7;
        }

        /* منطقة الإدخال */
        .input-area { 
            position: relative; z-index: 10; padding: 15px; 
            background: #000; display: flex; gap: 10px; 
            border-top: 1px solid #222; 
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
        }

        input { 
            flex: 1; padding: 12px; background: #111; 
            border: 1px solid #333; color: var(--neon); 
            border-radius: 8px; outline: none; font-size: 16px; 
        }

        .btn-send { 
            padding: 0 20px; background: linear-gradient(45deg, var(--purple), var(--neon)); 
            border: none; color: white; border-radius: 8px; 
            font-weight: bold; cursor: pointer; font-family: 'Orbitron';
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="header">
        <div class="logo-3d">KBW SYSTEM</div>
    </div>

    <div id="messages"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter')send()">
        <button class="btn-send" onclick="send()">SEND</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // إعدادات الفايربيس حقتك (مربوطة وجاهزة)
        const firebaseConfig = {
            apiKey: "AIzaSyCStasVXz1XVpz16U-X0tscQQYI8CFkeRM",
            authDomain: "costm-system.firebaseapp.com",
            projectId: "costm-system",
            storageBucket: "costm-system.firebasestorage.app",
            messagingSenderId: "24126933645",
            appId: "1:24126933645:web:e38b4a3456dd1e5d87b0c4",
            databaseURL: "https://costm-system-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'kbw_main_chat');

        // نظام توليد اسم فريد تلقائياً لكل جهاز
        let myId = localStorage.getItem('kbw_user_id');
        if (!myId) {
            myId = "USER-" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('kbw_user_id', myId);
        }

        // تشغيل خلفية الجزيئات
        particlesJS('particles-js', {
            "particles": { "number": { "value": 40 }, "color": { "value": "#00f2fe" }, "opacity": { "value": 0.2 }, "line_linked": { "enable": true, "opacity": 0.1 } }
        });

        // وظيفة الإرسال
        window.send = () => {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                push(chatRef, {
                    user: myId,
                    text: input.value,
                    ts: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                });
                input.value = "";
            }
        };

        // عرض الرسائل
        onChildAdded(chatRef, (snap) => {
            const d = snap.val();
            const box = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg-card';
            div.innerHTML = `<span class="user-tag">${d.user}</span><div>${d.text}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
