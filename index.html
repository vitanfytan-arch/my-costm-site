<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBW CHAT WORKING</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo';
background:#050505;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:15px;
text-align:center;
background:#111;
border-bottom:1px solid #222;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px;
border-radius:12px;
max-width:75%;
}

.me{background:#0084ff; align-self:flex-end;}
.other{background:#222; align-self:flex-start;}

.time{font-size:10px; opacity:0.6;}

.input{
display:flex;
padding:10px;
background:#111;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

button{
margin-right:10px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#0084ff;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header>🔥 KBW CHAT (شغال)</header>

<div id="chat"></div>

<div class="input">
<input id="msg" placeholder="اكتب رسالة..." />
<button id="sendBtn">إرسال</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// 🔥 إعداداتك (جاهزة)
const firebaseConfig = {
apiKey: "AIzaSyCStasVxz1XVpz16U-X0tscQQYI8CFkErM",
authDomain: "costm-system.firebaseapp.com",
projectId: "costm-system",
storageBucket: "costm-system.firebasestorage.app",
messagingSenderId: "24126933645",
appId: "1:24126933645:web:e38b4a3456dd1e5d87b0c4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// عناصر
const chat = document.getElementById("chat");
const msg = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");

// اسم المستخدم
let username = localStorage.getItem("kbw_name");
if(!username){
username = prompt("اكتب اسمك:");
localStorage.setItem("kbw_name", username);
}

// تسجيل دخول مؤكد 🔥
signInAnonymously(auth);

onAuthStateChanged(auth, (user)=>{
if(user){
console.log("✅ تم تسجيل الدخول", user.uid);
}else{
alert("❌ فشل تسجيل الدخول");
}
});

let lastSend = 0;

// إرسال (مضمون يشتغل)
async function send(){

console.log("تم الضغط"); // اختبار

const text = msg.value.trim();

if(!text){
alert("اكتب رسالة");
return;
}

if(!auth.currentUser){
alert("انتظر تسجيل الدخول...");
return;
}

// منع سبام
let now = Date.now();
if(now - lastSend < 1000){
alert("تمهل 😅");
return;
}
lastSend = now;

try{
await addDoc(collection(db,"messages"),{
text: text,
name: username,
uid: auth.currentUser.uid,
time: serverTimestamp()
});

msg.value="";
console.log("✅ تم الإرسال");

}catch(e){
console.error(e);
alert("❌ مشكلة في Firestore (شوف Rules)");
}
}

// زر
sendBtn.addEventListener("click", send);

// Enter
msg.addEventListener("keypress",(e)=>{
if(e.key==="Enter") send();
});

// استقبال
const q = query(collection(db,"messages"), orderBy("time"), limit(100));

onSnapshot(q,(snap)=>{
snap.docChanges().forEach(change=>{
if(change.type==="added"){
const d = change.doc.data();
if(!d.time) return;

const div = document.createElement("div");
div.className = "msg " + (d.uid===auth.currentUser.uid ? "me":"other");

const t = new Date(d.time.seconds*1000).toLocaleTimeString();

div.innerHTML = `
<b>${d.name}</b><br>
${d.text}
<div class="time">${t}</div>
`;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}
});
});
</script>

</body>
</html>
