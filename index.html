<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>موقعي الاحترافي</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta name="description" content="مطور مواقع يقدم تصميم مواقع احترافية متجاوبة وسريعة">
<meta name="keywords" content="تصميم مواقع, برمجة, تطوير ويب">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Tajawal", sans-serif;
}
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
overflow-x:hidden;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:#0f2027;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
.spinner{
width:50px;
height:50px;
border:5px solid #fff;
border-top:5px solid #00c3ff;
border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin{
100%{transform:rotate(360deg);}
}

/* GLOBAL */
.container{
width:85%;
margin:auto;
}
section{
padding:80px 0;
}
h2.section-title{
text-align:center;
font-size:32px;
margin-bottom:40px;
}

/* GLASS */
.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:15px;
border:1px solid rgba(255,255,255,0.15);
}

/* HEADER */
header{
position:fixed;
width:100%;
z-index:1000;
padding:10px 0;
}
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 7%;
}
nav .logo{
font-size:26px;
font-weight:bold;
}
nav ul{
display:flex;
gap:25px;
list-style:none;
}
nav a{
color:#fff;
text-decoration:none;
transition:.3s;
}
nav a:hover{
color:#00c3ff;
}

/* MOBILE */
.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
}
@media(max-width:768px){
nav ul{
display:none;
flex-direction:column;
background:rgba(0,0,0,0.6);
padding:20px;
position:absolute;
top:60px;
right:20px;
}
nav ul.active{display:flex;}
.menu-btn{display:block;}
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1522199710521-72d69614c702') center/cover;
position:relative;
}
.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}
.hero-content{
position:relative;
z-index:2;
}
.btn{
padding:12px 28px;
background:#00c3ff;
border:none;
border-radius:10px;
color:#fff;
cursor:pointer;
}

/* CARDS HOVER */
.service-box:hover,
.price-card:hover,
.testimonial:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* GRID */
.services,.pricing,.testimonials{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

/* CONTACT */
.contact-wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}
@media(max-width:900px){
.contact-wrapper{grid-template-columns:1fr;}
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:#fff;
}

/* TOP BTN */
#topBtn{
position:fixed;
bottom:80px;
right:20px;
padding:10px;
border:none;
border-radius:10px;
background:#00c3ff;
color:#fff;
display:none;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader"><div class="spinner"></div></div>

<header class="glass">
<nav>
<div class="logo">💎 موقعي</div>

<ul id="menu">
<li><a href="#hero">الرئيسية</a></li>
<li><a href="#about">من أنا</a></li>
<li><a href="#services">الخدمات</a></li>
<li><a href="#contact">تواصل</a></li>
</ul>

<div class="menu-btn" onclick="toggleMenu()">
<i class="fa fa-bars"></i>
</div>

</nav>
</header>

<section class="hero" id="hero">
<div class="hero-content">
<h1 id="typing"></h1>
<p>تصميم احترافي متجاوب</p>
<button class="btn" onclick="scrollToSection('about')">ابدأ</button>
</div>
</section>

<section id="about">
<h2 class="section-title">من أنا</h2>
<div class="container glass" style="padding:30px;text-align:center;">
<p>مطور مواقع محترف أصمم مواقع حديثة وسريعة.</p>
</div>
</section>

<section id="services">
<h2 class="section-title">الخدمات</h2>
<div class="container services">

<div class="service-box glass" style="padding:20px;text-align:center;">
<h3>تصميم مواقع</h3>
</div>

<div class="service-box glass" style="padding:20px;text-align:center;">
<h3>برمجة</h3>
</div>

</div>
</section>

<section id="contact">
<h2 class="section-title">تواصل</h2>
<div class="container contact-wrapper">

<form action="https://formsubmit.co/example@mail.com" method="POST" class="glass" style="padding:20px;">
<input type="text" placeholder="اسمك" required><br><br>
<input type="email" placeholder="بريدك" required><br><br>
<textarea placeholder="رسالتك"></textarea><br><br>
<button class="btn">إرسال</button>
</form>

<div class="glass" style="padding:20px;">
<p>email@example.com</p>
</div>

</div>
</section>

<footer style="text-align:center;padding:20px;">
© 2026
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/966500000000" target="_blank" class="whatsapp">
<i class="fa fa-whatsapp"></i>
</a>

<!-- TOP -->
<button id="topBtn">↑</button>

<script>

/* LOADER */
window.addEventListener("load", ()=>{
document.getElementById("loader").style.display="none";
});

/* MENU */
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* SCROLL */
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* TYPING */
const text="موقع احترافي 🔥";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}
}
type();

/* TOP BUTTON */
const topBtn=document.getElementById("topBtn");
window.addEventListener("scroll",()=>{
if(window.scrollY>300){
topBtn.style.display="block";
}else{
topBtn.style.display="none";
}
});
topBtn.onclick=()=>{
window.scrollTo({top:0,behavior:"smooth"});
};

</script>

</body>
</html>
