<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBW | VIOLET SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue-neon: #00d2ff; 
            --purple-neon: #bc13fe; /* لون بنفسجي نيوني */
            --brown-bg: #3e2723; 
            --dark-brown: #2b1d1a; 
        }
        
        * { box-sizing: border-box; }
        body { 
            background-color: var(--brown-bg); 
            margin: 0; font-family: 'Tajawal', sans-serif; 
            height: 100vh; color: white; 
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* --- شاشة الدخول --- */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1210;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-in-out;
        }

        .intro-text {
            font-family: 'Orbitron';
            font-size: 35px;
            color: var(--purple-neon);
            text-shadow: 0 0 15px var(--purple-neon);
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.4; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- الواجهة الرئيسية --- */
        #main-content {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        @keyframes sway {
            0% { transform: translateX(0px); }
            50% { transform: translateX(6px); }
            100% { transform: translateX(0px); }
        }

        .header { 
            padding: 15px; background: var(--dark-brown); 
            border-bottom: 2px solid var(--purple-neon); 
            text-align: center; font-family: 'Orbitron'; 
            color: var(--purple-neon); text-shadow: 0 0 10px var(--purple-neon);
            animation: sway 4s infinite ease-in-out;
        }

        #messages { 
            flex: 1; padding: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(0,0,0,0.3);
        }
        
        /* تصميم الرسالة بالإطار البنفسجي */
        .msg-card { 
            background: rgba(20, 10, 20, 0.6); padding: 12px; 
            border-radius: 10px; max-width: 80%; 
            border: 1px solid var(--purple-neon); /* إطار بنفسجي كامل */
            box-shadow: 0 0 8px rgba(188, 19, 254, 0.3);
            align-self: flex-start;
            animation: sway 5s infinite ease-in-out;
        }
        
        .my-msg {
            align-self: flex-end; 
            background: rgba(188, 19, 254, 0.1);
            border-color: var(--blue-neon); /* إطار أزرق لرسائلك لتمييزها أو اجعلها بنفسجي أيضاً حسب رغبتك */
        }

        .msg-card img {
            max-width: 100%; border-radius: 5px; margin-top: 10px;
            border: 1px solid var(--purple-neon);
            display: block;
        }

        .user-tag { 
            display: block; font-family: 'Orbitron'; 
            font-size: 11px; color: var(--purple-neon); 
            margin-bottom: 8px; border-bottom: 1px solid rgba(188, 19, 254, 0.2);
        }

        /* منطقة الإدخال */
        .input-area { 
            padding: 20px; background: var(--dark-brown); 
            display: flex; gap: 10px; border-top: 1px solid var(--purple-neon);
            align-items: center;
        }

        input[type="text"] { 
            flex: 1; padding: 15px; background: #1a1210; 
            border: 1px solid var(--purple-neon); color: white; 
            border-radius: 8px; outline: none;
        }

        .file-label {
            cursor: pointer; font-size: 24px; padding: 5px 10px;
            filter: drop-shadow(0 0 5px var(--purple-neon));
        }

        button { 
            padding: 0 25px; height: 50px; background: var(--purple-neon); 
            border: none; color: white; border-radius: 8px; 
            font-weight: bold; cursor: pointer; font-family: 'Orbitron';
            box-shadow: 0 0 10px var(--purple-neon);
        }
        
        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-text">INITIALIZING KBW...</div>
    </div>

    <div id="main-content">
        <div class="header">KBW CONTROL PANEL</div>

        <div id="messages">
            <div class="msg-card">
                <span class="user-tag">KBW_ROOT</span>
                نظام الدردشة متصل.. جاهز لاستقبال البيانات.
            </div>
        </div>

        <div class="input-area">
            <label for="file-input" class="file-label">📸</label>
            <input type="file" id="file-input" accept="image/*">
            <input type="text" id="chat-input" placeholder="اكتب رسالة أو ارفع صورة...">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        // شاشة الدخول
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-overlay').style.display = 'none';
                    document.getElementById('main-content').style.display = 'flex';
                }, 1000);
            }, 2000);
        };

        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');
        const fileInput = document.getElementById('file-input');

        function addMessage(content, type, isImage = false) {
            const msgCard = document.createElement('div');
            msgCard.className = `msg-card ${type}`;
            
            const userTag = document.createElement('span');
            userTag.className = 'user-tag';
            userTag.innerText = type === 'my-msg' ? 'KBW_USER' : 'KBW_ROOT';
            
            msgCard.appendChild(userTag);

            if (isImage) {
                const img = document.createElement('img');
                img.src = content;
                msgCard.appendChild(img);
            } else {
                const text = document.createElement('div');
                text.innerText = content;
                msgCard.appendChild(text);
            }

            messagesDiv.appendChild(msgCard);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        sendBtn.onclick = () => {
            if (chatInput.value.trim() !== "") {
                addMessage(chatInput.value, 'my-msg');
                chatInput.value = "";
            }
        };

        chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendBtn.click(); };

        fileInput.onchange = function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => addMessage(e.target.result, 'my-msg', true);
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
