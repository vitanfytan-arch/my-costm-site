<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KBW | NEURAL NETWORK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --neon: #00f2fe; --dark: #050a0e; --purple: #7000ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); margin: 0; font-family: 'Tajawal', sans-serif; height: 100vh; color: white; overflow: hidden; display: flex; flex-direction: column; }
        
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        .header { 
            position: relative; z-index: 10; padding: 15px; 
            background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--neon); 
            display: flex; justify-content: space-between; align-items: center; 
            font-family: 'Orbitron'; color: var(--neon);
            text-shadow: 0 0 10px var(--neon);
        }

        #messages { 
            flex: 1; position: relative; z-index: 10; 
            padding: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 15px; 
            background: rgba(0,0,0,0.05);
        }
        
        .msg-card { 
            background: rgba(255,255,255,0.05); padding: 12px 18px; 
            border-radius: 15px; max-width: 85%; 
            border-right: 3px solid var(--neon); 
            animation: fadeIn 0.3s ease;
        }
        
        .user-label {
            display: block; font-family: 'Orbitron'; font-size: 10px;
            color: var(--neon); margin-bottom: 5px; opacity: 0.8;
        }

        .input-area { 
            position: relative; z-index: 10; padding: 20px; 
            background: #000; display: flex; gap: 10px; 
            border-top: 1px solid #222; 
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); 
        }

        input { 
            flex: 1; padding: 15px; background: #111; 
            border: 1px solid #333; color: var(--neon); 
            border-radius: 10px; outline: none; font-size: 16px; 
        }

        .send-btn { 
            padding: 0 25px; background: linear-gradient(45deg, var(--purple), var(--neon)); 
            border: none; color: white; border-radius: 10px; 
            font-weight: bold; cursor: pointer; font-family: 'Orbitron';
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="header">
        <span>KBW SYSTEM</span>
        <span id="my-identity" style="font-size: 10px; opacity: 0.6;"></span>
    </div>

    <div id="messages"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter')send()">
        <button class="send-btn" onclick="send()">SEND</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ربط الـ Firebase الخاص بك
        const firebaseConfig = {
            apiKey: "AIzaSyCStasVXz1XVpz16U-X0tscQQYI8CFkeRM",
            authDomain: "costm-system.firebaseapp.com",
            projectId: "costm-system",
            storageBucket: "costm-system.firebasestorage.app",
            messagingSenderId: "24126933645",
            appId: "1:24126933645:web:e38b4a3456dd1e5d87b0c4",
            databaseURL: "https://costm-system-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'kbw_auto_chat');

        // نظام توليد الاسم المميز
        function getMyName() {
            let name = localStorage.getItem('kbw_auto_name');
            if (!name) {
                // توليد رقم عشوائي فريد لكل متصفح
                const randomId = Math.floor(1000 + Math.random() * 9000);
                name = "USER-" + randomId;
                localStorage.setItem('kbw_auto_name', name);
            }
            return name;
        }

        const myName = getMyName();
        document.getElementById('my-identity').innerText = "ID: " + myName;

        // تهيئة الخلفية
        particlesJS('particles-js', {
            "particles": { "number": { "value": 40 }, "color": { "value": "#00f2fe" }, "line_linked": { "opacity": 0.1 } }
        });

        // إرسال الرسالة
        window.send = () => {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                push(chatRef, {
                    user: myName,
                    text: input.value,
                    ts: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                });
                input.value = "";
            }
        };

        // استقبال الرسائل
        onChildAdded(chatRef, (snap) => {
            const data = snap.val();
            const box = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg-card';
            // إذا كانت الرسالة مني، اجعل الحواف بلون مختلف قليلاً
            if(data.user === myName) div.style.borderRightColor = 'var(--purple)';
            
            div.innerHTML = `
                <span class="user-label">${data.user}</span>
                <div>${data.text}</div>
                <div style="font-size:9px; color:#444; margin-top:5px;">${data.ts}</div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
