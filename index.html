<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحتي الأولى</title>
    <style>
        /* هنا نضع لمسات الجمال (CSS) */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>مرحباً بك في عالم البرمجة! 🚀</h1>
        <p>هذه أول صفحة ويب أقوم بإنشائها باستخدام HTML.</p>
        <button onclick="greet()">اضغط هنا</button>
    </div>

    <script>
        // هنا نضع التفاعل (JavaScript)
        function greet() {
            alert("أهلاً بك! أنت الآن مبرمج ويب مبتدئ.");
        }
    </script>

</body>
</html>
