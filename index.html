<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBW | CUSTOM CHAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue-neon: #00d2ff; 
            --brown-bg: #3e2723; 
            --dark-brown: #2b1d1a; 
        }
        
        * { box-sizing: border-box; }
        body { 
            background-color: var(--brown-bg); 
            margin: 0; font-family: 'Tajawal', sans-serif; 
            height: 100vh; color: white; 
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* أنيميشن الحركة الجانبية */
        @keyframes sway {
            0% { transform: translateX(0px); }
            50% { transform: translateX(8px); }
            100% { transform: translateX(0px); }
        }

        .header { 
            padding: 15px; background: var(--dark-brown); 
            border-bottom: 2px solid var(--blue-neon); 
            text-align: center; font-family: 'Orbitron'; 
            color: var(--blue-neon); text-shadow: 0 0 10px var(--blue-neon);
            animation: sway 4s infinite ease-in-out;
            z-index: 10;
        }

        #messages { 
            flex: 1; padding: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(0,0,0,0.2);
            scroll-behavior: smooth;
        }
        
        /* تصميم الرسالة */
        .msg-card { 
            background: rgba(255,255,255,0.05); padding: 12px; 
            border-radius: 12px; max-width: 80%; 
            border-right: 4px solid var(--blue-neon); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            align-self: flex-start;
            animation: sway 5s infinite ease-in-out;
            word-wrap: break-word;
        }
        
        .my-msg {
            align-self: flex-end; border-right: none; 
            border-left: 4px solid #fff; 
            background: rgba(0, 210, 255, 0.1);
        }

        .msg-card img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            border: 1px solid var(--blue-neon);
        }

        .user-tag { display: block; font-family: 'Orbitron'; font-size: 10px; color: var(--blue-neon); margin-bottom: 5px; }

        /* منطقة الإدخال */
        .input-area { 
            padding: 15px; background: var(--dark-brown); 
            display: flex; gap: 10px; border-top: 2px solid var(--blue-neon);
            align-items: center;
        }

        input[type="text"] { 
            flex: 1; padding: 12px; background: #1a1210; 
            border: 1px solid #5d4037; color: var(--blue-neon); 
            border-radius: 8px; outline: none; font-size: 16px;
        }

        /* زر رفع الصور */
        .file-label {
            cursor: pointer; padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px; color: var(--blue-neon);
            transition: 0.3s;
        }
        .file-label:hover { background: var(--blue-neon); color: black; }

        button { 
            padding: 12px 25px; background: var(--blue-neon); 
            border: none; color: black; border-radius: 8px; 
            font-weight: bold; cursor: pointer; font-family: 'Orbitron';
            transition: 0.3s;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px var(--blue-neon); }
        
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="header">SYSTEM - KBW CHAT</div>

    <div id="messages">
        <div class="msg-card">
            <span class="user-tag">SYSTEM</span>
            مرحباً بك في نظام KBW. يمكنك إرسال النصوص والصور الآن.
        </div>
    </div>

    <div class="input-area">
        <label for="file-input" class="file-label">📎</label>
        <input type="file" id="file-input" accept="image/*">
        
        <input type="text" id="chat-input" placeholder="اكتب رسالتك هنا...">
        
        <button onclick="sendMessage()">SEND</button>
    </div>

    <script>
        const chatInput = document.getElementById('chat-input');
        const messagesDiv = document.getElementById('messages');
        const fileInput = document.getElementById('file-input');

        // وظيفة إرسال الرسالة
        function sendMessage() {
            const text = chatInput.value.trim();
            if (text !== "") {
                createMessage(text, 'my-msg');
                chatInput.value = "";
            }
        }

        // إنشاء عنصر الرسالة في الشاشة
        function createMessage(content, type, isImage = false) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg-card');
            if (type === 'my-msg') msgDiv.classList.add('my-msg');

            let innerHTML = `<span class="user-tag">${type === 'my-msg' ? 'YOU' : 'KBW'}</span>`;
            
            if (isImage) {
                innerHTML += `<img src="${content}" />`;
            } else {
                innerHTML += `<div>${content}</div>`;
            }

            msgDiv.innerHTML = innerHTML;
            messagesDiv.appendChild(msgDiv);
            
            // سكرول تلقائي للأسفل
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // التعامل مع رفع الصور
        fileInput.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    createMessage(event.target.result, 'my-msg', true);
                };
                reader.readAsDataURL(file);
            }
        };

        // دعم زر Enter من الكيبورد
        chatInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
