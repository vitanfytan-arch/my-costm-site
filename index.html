<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KBW | NEURAL HUB PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00f2fe; 
            --dark-bg: #050a0e; 
            --light-bg: #f0f4f8;
            --purple: #7000ff; 
            --glass: rgba(255, 255, 255, 0.05);
            --ai-gold: #ffd700;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border-color: rgba(112, 0, 255, 0.3);
        }

        body.light-mode {
            --dark-bg: var(--light-bg);
            --text-color: #1a1a1a;
            --card-bg: rgba(0, 0, 0, 0.05);
            --border-color: var(--purple);
            --glass: rgba(0, 0, 0, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--dark-bg); 
            margin: 0; 
            font-family: 'Tajawal', sans-serif; 
            height: 100vh; 
            color: var(--text-color); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            transition: background 0.5s, color 0.5s;
        }

        .bg-cubes {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .cube {
            position: absolute;
            width: 40px; height: 40px;
            border: 1px solid var(--border-color);
            background: rgba(112, 0, 255, 0.05);
            animation: float 15s infinite linear;
            bottom: -100px;
            border-radius: 4px;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: 1s ease-in-out;
        }

        .splash-logo {
            font-family: 'Orbitron';
            font-size: 4rem;
            color: var(--purple);
            font-weight: 900;
            text-shadow: 0 0 30px var(--purple);
        }

        #login-gate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .login-box {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 380px;
            text-align: center;
            backdrop-filter: blur(15px);
        }

        .login-box h1 { font-family: 'Orbitron'; color: var(--purple); margin-bottom: 25px; }

        .login-box input {
            width: 100%; padding: 14px; margin: 10px 0;
            background: rgba(0,0,0,0.1); border: 1px solid var(--border-color);
            border-radius: 10px; color: var(--purple); text-align: center;
            font-family: 'Tajawal'; outline: none;
        }

        .btn-login {
            width: 100%; padding: 14px;
            background: var(--purple);
            border: none; color: white; border-radius: 10px;
            font-family: 'Orbitron'; cursor: pointer; margin-top: 15px;
        }

        #main-menu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
        }

        .menu-card {
            width: 85%;
            max-width: 320px;
            padding: 18px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            font-family: 'Tajawal';
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            transition: 0.3s;
        }
        .menu-card:hover { transform: scale(1.05); background: var(--purple); color: white; }

        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--card-bg);
            border: 1px solid var(--purple);
            color: var(--text-color);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            z-index: 1500;
        }

        #app-content { display: none; flex-direction: column; height: 100vh; }

        .header { 
            padding: 15px; 
            background: var(--dark-bg); 
            border-bottom: 2px solid var(--purple); 
            display: flex; justify-content: space-between; align-items: center;
        }

        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-card { 
            background: var(--glass); 
            padding: 12px 18px; 
            border-radius: 15px; 
            border: 1px solid var(--border-color);
            color: var(--text-color);
            max-width: 85%;
        }

        .msg-container.me { align-self: flex-start; }
        .msg-container.others { align-self: flex-end; }

        .input-area { 
            padding: 15px; 
            background: var(--dark-bg); 
            display: flex; gap: 8px; 
            border-top: 1px solid var(--border-color); 
        }

        input#msgInput { 
            flex: 1; padding: 12px; 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            color: var(--text-color); 
            border-radius: 8px; outline: none; 
        }

        .btn-send { 
            background: var(--purple); 
            padding: 0 20px; border:none; border-radius:8px; 
            color:white; font-weight:bold; cursor:pointer;
        }

        .user-tag { font-size: 10px; margin-bottom: 4px; color: var(--purple); }
    </style>
</head>
<body>

    <div class="bg-cubes" id="cube-container"></div>
    <button class="theme-toggle" onclick="toggleTheme()">تبديل النمط 🌓</button>

    <div id="splash-screen">
        <div class="splash-logo">KBW</div>
    </div>

    <!-- Login Gate -->
    <div id="login-gate">
        <div class="login-box">
            <h1>دخول النظام</h1>
            <p style="font-size: 11px; opacity: 0.7;">أدخل اسم المستخدم (KBWXXX) والرمز السري</p>
            <input type="text" id="username" placeholder="اسم المستخدم (مثال: KBW101)">
            <input type="password" id="password" placeholder="رمز المرور (4 أرقام)" maxlength="4" pattern="\d*">
            <button class="btn-login" onclick="attemptLogin()">دخول آمن</button>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu">
        <h2 style="font-family: 'Orbitron'; color: var(--purple); margin-bottom: 20px;">HUB CENTRAL</h2>
        <div id="user-welcome" style="margin-bottom:15px; font-size:14px; color:var(--ai-gold)">أهلاً بك: <span id="current-display-name">---</span></div>
        <div class="menu-card" onclick="openChat()">1. دخول الدردشة</div>
        <div class="menu-card" onclick="logout()">2. تسجيل الخروج</div>
    </div>

    <!-- Chat App -->
    <div id="app-content">
        <div class="header">
            <div style="font-family:'Orbitron'; color:var(--purple); font-weight:900;">KBW HUB</div>
            <button onclick="backToMenu()" style="background:none; border:1px solid var(--purple); color:var(--purple); padding:5px 10px; border-radius:5px; cursor:pointer;">رجوع</button>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="اكتب رسالتك..." autocomplete="off">
            <button class="btn-send" onclick="send()">إرسال</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // الحسابات المحدثة بنمط KBW مع ثلاثة أرقام
        const presetUsers = {
            "KBW101": "1010",
            "KBW202": "2020",
            "KBW303": "3030",
            "KBW404": "4040",
            "KBW505": "5050"
        };

        let userAlias = localStorage.getItem('kbw_alias') || "";
        let currentUser = null;

        // تهيئة المصادقة أولاً قبل أي عملية Firestore
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth initialization failed:", err);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                if(localStorage.getItem('kbw_logged')) showMenu();
                else document.getElementById('login-gate').style.display = 'flex';
            }, 1500);
        });

        window.attemptLogin = () => {
            const u = document.getElementById('username').value.trim().toUpperCase();
            const p = document.getElementById('password').value;

            if (presetUsers[u] && presetUsers[u] === p) {
                localStorage.setItem('kbw_logged', 'true');
                localStorage.setItem('kbw_alias', u);
                userAlias = u;
                showMenu();
            } else {
                alert("بيانات الدخول غير صحيحة. يرجى استخدام نمط KBWXXX وكلمة سر 4 أرقام.");
            }
        };

        function showMenu() {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('current-display-name').innerText = userAlias;
        }

        window.openChat = () => {
            if (!currentUser) {
                alert("يرجى الانتظار حتى يتم الاتصال بالخادم...");
                return;
            }
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            initChat();
        };

        window.backToMenu = () => showMenu();

        window.logout = () => {
            localStorage.removeItem('kbw_logged');
            localStorage.removeItem('kbw_alias');
            location.reload();
        };

        let chatSub = null;
        function initChat() {
            if (chatSub || !currentUser) return;
            // استخدام المسار الصحيح والمطلوب للأذونات
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
            chatSub = onSnapshot(q, (snap) => {
                const msgs = [];
                snap.forEach(doc => msgs.push(doc.data()));
                msgs.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                renderMessages(msgs);
            }, (error) => {
                console.error("خطأ في جلب الرسائل:", error);
            });
        }

        window.send = async () => {
            const input = document.getElementById('msgInput');
            if(!input.value.trim() || !currentUser) return;
            const text = input.value;
            input.value = '';
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                    alias: userAlias,
                    text: text,
                    createdAt: serverTimestamp(),
                    uid: currentUser.uid
                });
            } catch (err) {
                console.error("خطأ في إرسال الرسالة:", err);
            }
        };

        function renderMessages(msgs) {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            msgs.forEach(m => {
                const isMe = m.alias === userAlias;
                const div = document.createElement('div');
                div.className = `msg-container ${isMe ? 'me' : 'others'}`;
                div.innerHTML = `<span class="user-tag">${m.alias}</span><div class="msg-card">${m.text}</div>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        window.toggleTheme = () => document.body.classList.toggle('light-mode');

        const bg = document.getElementById('cube-container');
        for(let i=0; i<10; i++) {
            const c = document.createElement('div');
            c.className = 'cube';
            c.style.left = Math.random() * 100 + '%';
            c.style.animationDelay = (Math.random() * 5) + 's';
            bg.appendChild(c);
        }
    </script>
</body>
</html>
