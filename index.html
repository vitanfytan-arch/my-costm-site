<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBW Chat Login</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo';
background:#050505;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}

/* شاشة الدخول */
#authBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#050505;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:#111;
padding:25px;
border-radius:15px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#0084ff;
color:white;
cursor:pointer;
}

/* الشات */
#chatUI{
display:none;
flex-direction:column;
height:100vh;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{padding:10px;border-radius:10px;max-width:70%;}
.me{background:#0084ff;align-self:flex-end;}
.other{background:#222;}

.input{display:flex;padding:10px;background:#111;}
</style>
</head>

<body>

<!-- تسجيل -->
<div id="authBox">
<div class="box">
<h2>KBW</h2>

<input id="email" placeholder="الإيميل">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="login()">تسجيل دخول</button>
<button onclick="register()">إنشاء حساب</button>

</div>
</div>

<!-- الشات -->
<div id="chatUI">
<div id="chat"></div>

<div class="input">
<input id="msg" placeholder="اكتب..." />
<button onclick="send()">إرسال</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCStasVxz1XVpz16U-X0tscQQYI8CFkErM",
authDomain: "costm-system.firebaseapp.com",
projectId: "costm-system"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// تسجيل دخول
window.login = async ()=>{
try{
await signInWithEmailAndPassword(auth, email.value, password.value);
}catch(e){
alert("خطأ تسجيل دخول");
}
};

// إنشاء حساب
window.register = async ()=>{
try{
await createUserWithEmailAndPassword(auth, email.value, password.value);
alert("تم إنشاء الحساب ✅");
}catch(e){
alert("خطأ: "+e.message);
}
};

// عند تسجيل الدخول
onAuthStateChanged(auth,(user)=>{
if(user){
authBox.style.display="none";
chatUI.style.display="flex";
startChat();
}
});

// إرسال
window.send = async ()=>{
if(!msg.value) return;

await addDoc(collection(db,"messages"),{
text: msg.value,
uid: auth.currentUser.uid,
time: serverTimestamp()
});

msg.value="";
};

// استقبال
function startChat(){
const q = query(collection(db,"messages"), orderBy("time"));

onSnapshot(q,(snap)=>{
chat.innerHTML="";
snap.forEach(doc=>{
const d = doc.data();

const div = document.createElement("div");
div.className = "msg " + (d.uid===auth.currentUser.uid ? "me":"other");
div.innerText = d.text;

chat.appendChild(div);
});

chat.scrollTop = chat.scrollHeight;
});
}
</script>

</body>
</html>
