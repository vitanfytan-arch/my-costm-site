<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KBW - Global Platform</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #000000;
            --card-bg: #111111;
            --accent: #0084ff;
            --text: #ffffff;
            --gray: #888;
            --admin-color: #ff3e3e;
            --owner-color: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--main-bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* واجهة الدخول وإنشاء الحساب */
        #auth-container {
            position: fixed;
            inset: 0;
            background: var(--main-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #222;
        }

        .auth-card h2 { color: var(--accent); margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* واجهة الشات الرئيسية */
        #app-container { display: none; flex-direction: column; height: 100%; }

        header {
            padding: 15px;
            background: var(--card-bg);
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }

        /* فقاعات الرسائل */
        .msg {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-me { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; }
        .msg-them { align-self: flex-start; background: #222; border-bottom-left-radius: 2px; }

        .sender-info { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: flex; gap: 5px; }
        .rank-tag { padding: 1px 5px; border-radius: 4px; font-size: 9px; }
        
        /* نظام الإدخال الأسفل */
        .input-area {
            padding: 15px;
            background: var(--card-bg);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .file-label {
            background: #333;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        #image-preview { max-width: 100%; border-radius: 10px; margin-top: 5px; }

    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-card">
            <h2>KBW JOIN</h2>
            <input type="text" id="user-name" placeholder="اسم المستخدم">
            <input type="email" id="user-email" placeholder="البريد الإلكتروني">
            <input type="password" id="user-pass" placeholder="كلمة السر (10+ خانات)">
            <button class="btn" onclick="handleAuth('signup')">إنشاء حساب جديد</button>
            <p style="font-size: 12px; color: var(--gray); margin: 10px 0;">أو</p>
            <button class="btn" style="background:#222;" onclick="handleAuth('login')">تسجيل دخول</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <b style="color: var(--accent);">KBW SYSTEM</b>
            <div id="user-profile" style="font-size: 12px;"></div>
        </header>

        <div id="chat-box">
            </div>

        <div class="input-area">
            <label class="file-label">
                📷 <input type="file" id="file-input" style="display:none;" accept="image/*">
            </label>
            <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا...">
            <button class="btn" style="width: 80px; margin:0;" onclick="sendMedia()">إرسال</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

        // إعداداتك من الصورة
        const firebaseConfig = {
            apiKey: "AIzaSyCStasVxz1XVpz16U-X0tscQQYI8CFkErM",
            authDomain: "costm-system.firebaseapp.com",
            projectId: "costm-system",
            storageBucket: "costm-system.appspot.com",
            messagingSenderId: "24126933645",
            appId: "1:24126933645:web:e38b4a3456dd1e5d87b0c4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let myProfile = null;

        // --- نظام التزامن الفوري ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    myProfile = docSnap.data();
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                    document.getElementById('user-profile').innerText = `مرحباً، ${myProfile.username}`;
                    listenToMessages();
                }
            }
        });

        // --- وظيفة إنشاء الحساب ---
        window.handleAuth = async (type) => {
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;
            const name = document.getElementById('user-name').value;

            try {
                if (type === 'signup') {
                    if (pass.length < 10) return alert("كلمة السر يجب أن تكون 10 رموز!");
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), {
                        username: name,
                        rank: "member",
                        uid: res.user.uid
                    });
                    alert("تم إنشاء حسابك في KBW بنجاح!");
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (e) { alert("خطأ: " + e.message); }
        };

        // --- إرسال الرسائل والصور ---
        window.sendMedia = async () => {
            const text = document.getElementById('msg-input').value;
            const file = document.getElementById('file-input').files[0];
            
            if (!text && !file) return;

            let fileUrl = null;
            if (file) {
                const sRef = ref(storage, `chat/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                fileUrl = await getDownloadURL(sRef);
            }

            await addDoc(collection(db, "messages"), {
                text: text,
                img: fileUrl,
                sender: myProfile.username,
                rank: myProfile.rank,
                uid: auth.currentUser.uid,
                time: serverTimestamp()
            });

            document.getElementById('msg-input').value = "";
            document.getElementById('file-input').value = "";
        };

        // --- الاستماع للرسائل (تظهر عند الجميع فوراً) ---
        function listenToMessages() {
            const q = query(collection(db, "messages"), orderBy("time", "asc"), limit(100));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.uid === auth.currentUser.uid;
                    box.innerHTML += `
                        <div class="msg ${isMe ? 'msg-me' : 'msg-them'}">
                            <div class="sender-info">
                                <span>${m.sender}</span>
                                <span class="rank-tag" style="background:${m.rank==='owner'?'gold':'#555'}">${m.rank}</span>
                            </div>
                            ${m.text ? `<div>${m.text}</div>` : ''}
                            ${m.img ? `<img src="${m.img}" id="image-preview">` : ''}
                        </div>
                    `;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
