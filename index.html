<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBW LIVE CHAT</title>
    <style>
        body { background: #050a0e; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; border-right: 3px solid #00f2fe; }
        .user { color: #00f2fe; font-weight: bold; font-size: 0.8em; display: block; }
        .input-box { padding: 20px; background: #000; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: white; }
        button { padding: 10px 20px; background: #7000ff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div style="padding: 15px; border-bottom: 1px solid #00f2fe; text-align: center; font-weight: bold;">COSTM SYSTEM - LIVE</div>
    <div id="messages"></div>
    <div class="input-box">
        <input type="text" id="msgInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">إرسال</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // بياناتك من الصورة حرفياً
        const firebaseConfig = {
            apiKey: "AIzaSyCStasVXz1XVpz16U-X0tscQQYI8CFkeRM",
            authDomain: "costm-system.firebaseapp.com",
            projectId: "costm-system",
            storageBucket: "costm-system.firebasestorage.app",
            messagingSenderId: "24126933645",
            appId: "1:24126933645:web:e38b4a3456dd1e5d87b0c4",
            databaseURL: "https://costm-system-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'chat_v1');

        // توليد اسم تلقائي للمستخدم
        let myId = localStorage.getItem('kbw_id') || "USER-" + Math.floor(Math.random() * 9999);
        localStorage.setItem('kbw_id', myId);

        window.send = () => {
            const input = document.getElementById('msgInput');
            if(input.value.trim()){
                push(chatRef, { user: myId, text: input.value });
                input.value = "";
            }
        };

        onChildAdded(chatRef, (snap) => {
            const d = snap.val();
            const box = document.getElementById('messages');
            box.innerHTML += `<div class="msg"><span class="user">${d.user}</span>${d.text}</div>`;
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
